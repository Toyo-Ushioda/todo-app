<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="Personal task manager with reminders and cross-device sync" />
  <title>My To-Do List</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="auth-screen">
    <div class="login-card">
      <div class="login-icon">✅</div>
      <h1>My To-Do List</h1>
      <p>Sign in to access your tasks from any device.</p>
      <button id="google-signin-btn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div id="app-screen" class="hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <h1>My Tasks</h1>
        <div class="header-actions">
          <span id="user-name" class="user-name"></span>
          <button id="signout-btn" class="btn-link">Sign out</button>
        </div>
      </div>
    </header>

    <main class="app-main">

      <!-- Add Task Form -->
      <section class="card add-task-section">
        <h2 class="section-title">Add Task</h2>
        <form id="add-task-form" novalidate>
          <div class="form-row">
            <div class="form-group flex-1">
              <label for="task-title">Task *</label>
              <input type="text" id="task-title" placeholder="What needs to be done?" autocomplete="off" required />
              <span class="field-error" id="title-error"></span>
            </div>
            <div class="form-group priority-group">
              <label for="task-priority">Priority</label>
              <select id="task-priority">
                <option value="high">🔴 High</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="low">🟢 Low</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group flex-1">
              <label for="task-due-date">Due date &amp; time</label>
              <input type="datetime-local" id="task-due-date" />
            </div>
          </div>
          <div class="form-group">
            <label for="task-notes">Notes</label>
            <textarea id="task-notes" rows="2" placeholder="Optional details..."></textarea>
          </div>
          <button type="submit" id="add-task-btn" class="btn-primary">+ Add Task</button>
        </form>
      </section>

      <!-- Notification permission nudge (shown if permission not granted) -->
      <div id="notif-banner" class="notif-banner hidden">
        <span>🔔 Enable notifications to get reminders for your tasks.</span>
        <button id="enable-notif-btn" class="btn-small">Enable</button>
        <button id="dismiss-notif-btn" class="btn-icon" aria-label="Dismiss">✕</button>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs" role="tablist">
        <button class="tab active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="tab" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Task list -->
      <ul id="task-list" class="task-list" aria-label="Task list"></ul>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">📋</div>
        <p>No tasks here yet.<br>Add one above to get started!</p>
      </div>

    </main>

    <!-- PWA install banner -->
    <div id="install-banner" class="install-banner hidden">
      <span>📱 Install this app on your device for quick access.</span>
      <button id="install-btn" class="btn-small">Install</button>
      <button id="dismiss-install-btn" class="btn-icon" aria-label="Dismiss">✕</button>
    </div>

  </div><!-- /app-screen -->

  <!-- ===================== EDIT MODAL ===================== -->
  <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Edit Task</h2>
      <form id="edit-task-form" novalidate>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="edit-title">Task *</label>
            <input type="text" id="edit-title" required />
            <span class="field-error" id="edit-title-error"></span>
          </div>
          <div class="form-group priority-group">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority">
              <option value="high">🔴 High</option>
              <option value="medium">🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="edit-due-date">Due date &amp; time</label>
            <input type="datetime-local" id="edit-due-date" />
          </div>
        </div>
        <div class="form-group">
          <label for="edit-notes">Notes</label>
          <textarea id="edit-notes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-edit-btn" class="btn-secondary">Cancel</button>
          <button type="submit" id="save-edit-btn" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK (compat version for simpler syntax) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- App scripts (order matters) -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
